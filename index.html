<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDS GYM</title>

<!-- OSWALD FONT -->
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Oswald', sans-serif;
    background: #0d0d0d;
    color: red;
}

/* HEADER */
header {
    position: sticky;
    top: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
}

.logo {
    font-size: 36px;
    font-weight: 700;
    color: red;
}

.join-btn {
    background: transparent;
    border: 2px solid red;
    color: red;
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

.join-btn:hover {
    background: red;
    color: black;
}

/* HERO IMAGE */
.hero-card {
    width: 90%;
    max-width: 1200px;
    margin: 40px auto;
    border-radius: 25px;
    overflow: hidden;
}

.hero-card img {
    width: 100%;
    height: 600px;
    object-fit: cover;
}

/* EQUIPMENT GRID 2 ROWS × 5 COLUMNS */
.equipment-section {
    width: 90%;
    max-width: 1200px;
    margin: 60px auto;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 35px;
}

.equipment-card {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
    border: 1px solid red;
}

.equipment-card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 15px;
}

.equipment-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 0 20px red;
}

/* PLANS */
.card {
    width: 90%;
    max-width: 1200px;
    margin: 60px auto;
    padding: 30px;
    border-radius: 20px;
    background: #1a1a1a;
    border: 1px solid red;
    text-align: center;
}

.plans {
    font-size: 24px;
    font-weight: 600;
    line-height: 1.8;
}

/* LOCATION */
.location a {
    color: red;
    text-decoration: none;
    font-size: 20px;
}

.location a:hover {
    text-decoration: underline;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #1a1a1a;
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    border: 1px solid red;
}

.close {
    float: right;
    cursor: pointer;
    font-weight: bold;
}

/* RESPONSIVE */
@media(max-width: 900px) {
    .equipment-section {
        grid-template-columns: repeat(2, 1fr);
    }
}

</style>
</head>
<body>

<header>
    <div class="logo">BDS GYM</div>
    <button class="join-btn" onclick="payNow()">JOIN</button>
</header>

<!-- HEADER IMAGE -->
<div class="hero-card">
    <img src="20260302_152134.jpg" alt="Gym Header">
</div>

<!-- EQUIPMENT GRID -->
<div class="equipment-section">

    <div class="equipment-card" onclick="openModal('Stationary Bike')">
        <img src="bike.jpg">
        <p>Stationary Bike</p>
    </div>

    <div class="equipment-card" onclick="openModal('Kettlebell')">
        <img src="kettlebell.jpg">
        <p>Kettlebell</p>
    </div>

    <div class="equipment-card" onclick="openModal('Barbell')">
        <img src="barbell.jpg">
        <p>Barbell</p>
    </div>

    <div class="equipment-card" onclick="openModal('Lat Pulldown')">
        <img src="lat.jpg">
        <p>Lat Pulldown</p>
    </div>

    <div class="equipment-card" onclick="openModal('Bench Press')">
        <img src="bench.jpg">
        <p>Bench Press</p>
    </div>

    <div class="equipment-card" onclick="openModal('Squat Rack')">
        <img src="squat.jpg">
        <p>Squat Rack</p>
    </div>

    <div class="equipment-card" onclick="openModal('Dumbbells')">
        <img src="dumbbell.jpg">
        <p>Dumbbells</p>
    </div>

    <div class="equipment-card" onclick="openModal('Treadmill')">
        <img src="treadmill.jpg">
        <p>Treadmill</p>
    </div>

    <div class="equipment-card" onclick="openModal('Cable Machine')">
        <img src="cable.jpg">
        <p>Cable Machine</p>
    </div>

    <div class="equipment-card" onclick="openModal('Smith Machine')">
        <img src="smith.jpg">
        <p>Smith Machine</p>
    </div>

</div>

<!-- PLANS -->
<div class="card plans">
    About Plans<br><br>
    Joining<br>
    1500/-<br><br>
    Monthly<br>
    500/-
</div>

<!-- LOCATION -->
<div class="card location">
    📍 <a href="https://maps.app.goo.gl/AsagDupfQSvw7a4j6?g_st=aw" target="_blank">
        View Gym Location on Google Maps
    </a>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">X</span>
        <h3 id="modalTitle"></h3>
        <p>• Exercise 1<br>• Exercise 2<br>• Exercise 3</p>
    </div>
</div>

<script>

function payNow() {
    window.location.href = "upi://pay?pa=8638136604@ibl&pn=ARCHIMEDESGYM&cu=INR";
}

function openModal(name){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modalTitle").innerText=name;
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
